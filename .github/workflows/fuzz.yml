# =============================================================================
# fuzz.yml — Fuzzing Workflow
#
# Purpose:
#   Time-bounded fuzzing runs for C (AFL++ + libFuzzer), Rust (cargo-fuzz),
#   and Python (Atheris) targets. Crash artifacts are uploaded for later
#   triage. Sanitizers (ASan/UBSan) are enabled inside fuzz builds for
#   maximum bug detection.
#
# Triggers:
#   - workflow_dispatch only (fuzzing is compute-heavy; avoid accidental runs)
#   - scheduled weekly run on main to catch regressions over time
#
# Architecture:
#   - Each language fuzzer runs as a separate job
#   - Timeouts prevent unbounded execution (30 min per target)
#   - Crashes + corpora uploaded as artifacts
#   - Sanitizers baked into every fuzz build
# =============================================================================

name: Fuzz

on:
  schedule:
    # Weekly Sunday 02:00 UTC fuzz run on main.
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzz duration per target (seconds)"
        type: number
        default: 300

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  # Default fuzz duration if not provided via workflow_dispatch.
  FUZZ_DURATION: ${{ inputs.fuzz_duration || 300 }}

jobs:
  # ---------------------------------------------------------------------------
  # C — AFL++ + libFuzzer
  # ---------------------------------------------------------------------------
  fuzz-c:
    name: Fuzz C (AFL++ + libFuzzer)
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Hard timeout for the entire job

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install AFL++ + libFuzzer deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            afl++ \
            clang \
            llvm \
            make \
            gcc

      - name: Create example fuzz targets if absent
        run: |
          mkdir -p c/fuzz
          if [[ ! -f c/fuzz/fuzz_parser.c ]]; then
            cat > c/fuzz/fuzz_parser.c << 'EOF'
          #include <stdint.h>
          #include <stddef.h>
          #include <string.h>

          // libFuzzer entry point — exercise any parsing logic here.
          int LLVMFuzzerTestOneInput(const uint8_t *data, size_t size) {
              if (size == 0) return 0;
              // TODO: replace with real parser call.
              volatile char buf[64];
              size_t n = size < sizeof(buf) - 1 ? size : sizeof(buf) - 1;
              memcpy((void*)buf, data, n);
              buf[n] = '\0';
              return 0;
          }
          EOF
          fi

      - name: Build libFuzzer targets (Clang + ASan + UBSan)
        run: |
          mkdir -p build-fuzz/c
          find c/fuzz/ -name "*.c" 2>/dev/null | sort | \
            while IFS= read -r src; do
              name="$(basename "${src%.c}")"
              echo "Building libFuzzer target: $name"
              clang \
                -Wall -Wextra \
                -fsanitize=address,undefined,fuzzer \
                -fno-omit-frame-pointer \
                -g -O1 \
                "$src" \
                -o "build-fuzz/c/${name}" || true
            done

      - name: Run libFuzzer targets
        run: |
          mkdir -p fuzz-crashes/c fuzz-corpus/c

          find build-fuzz/c/ -type f -executable | sort | \
            while IFS= read -r target; do
              name="$(basename "$target")"
              echo "=== libFuzzer: $name (${FUZZ_DURATION}s) ==="

              mkdir -p "fuzz-corpus/c/${name}"

              # -max_total_time: wall-clock timeout
              # -artifact_prefix: crash output path
              # -print_final_stats=1: emit stats at end
              timeout $((FUZZ_DURATION + 30)) \
                "$target" \
                "fuzz-corpus/c/${name}" \
                -max_total_time="$FUZZ_DURATION" \
                -artifact_prefix="fuzz-crashes/c/${name}-" \
                -print_final_stats=1 \
                2>&1 | tee "fuzz-crashes/c/${name}-log.txt" || true

              echo "=== Crashes for $name ==="
              ls -la "fuzz-crashes/c/" | grep "$name" || echo "No crashes."
            done

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes-c
          path: fuzz-crashes/c/
          retention-days: 30

      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-c
          path: fuzz-corpus/c/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Rust — cargo-fuzz
  # ---------------------------------------------------------------------------
  fuzz-rust:
    name: Fuzz Rust (cargo-fuzz)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: rust-fuzz-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Create example fuzz target if absent
        run: |
          if [[ ! -d rust/fuzz ]]; then
            cd rust
            cargo fuzz init || true
            # Create a minimal fuzz target that exercises some parsing logic.
            mkdir -p fuzz/fuzz_targets
            if [[ ! -f fuzz/fuzz_targets/fuzz_target_1.rs ]]; then
              cat > fuzz/fuzz_targets/fuzz_target_1.rs << 'EOF'
          #![no_main]
          use libfuzzer_sys::fuzz_target;

          fuzz_target!(|data: &[u8]| {
              // TODO: replace with real function call.
              if let Ok(s) = std::str::from_utf8(data) {
                  let _ = s.parse::<i64>();
              }
          });
          EOF
            fi
          fi

      - name: Run cargo-fuzz targets
        run: |
          mkdir -p fuzz-crashes/rust

          cd rust

          # List available fuzz targets; fall back gracefully if none.
          TARGETS=$(cargo fuzz list 2>/dev/null || echo "fuzz_target_1")

          for target in $TARGETS; do
            echo "=== cargo-fuzz: $target (${FUZZ_DURATION}s) ==="
            cargo fuzz run "$target" \
              -- \
              -max_total_time="$FUZZ_DURATION" \
              -artifact_prefix="../fuzz-crashes/rust/${target}-" \
              -print_final_stats=1 \
              2>&1 | tee "../fuzz-crashes/rust/${target}-log.txt" || true
          done

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes-rust
          path: fuzz-crashes/rust/
          retention-days: 30
