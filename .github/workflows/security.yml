# =============================================================================
# security.yml — Security & Vulnerability Scanning Workflow
#
# Purpose:
#   Comprehensive security scanning for all three languages using GitHub
#   CodeQL, cargo-audit, pip-audit, and dependency review. Produces SBOM
#   fragments. Configured with minimal permissions following least-privilege.
#
# Triggers:
#   - push to main
#   - PR to main
#   - Scheduled weekly scan (Monday 01:00 UTC)
#   - workflow_dispatch
#
# Architecture:
#   - CodeQL scans C and Python in parallel (SARIF → GitHub Security tab)
#   - cargo-audit scans Rust advisory DB independently
#   - pip-audit scans the Python environment for known CVEs
#   - Dependency review on PRs blocks newly introduced vulnerable packages
#   - SBOM generated on main pushes for supply chain visibility
#
# pip-audit behaviour notes:
#   pip-audit exits 1 when it finds vulnerabilities AND when it finds nothing
#   to scan (no packages / no requirements). We must:
#     1. Always capture output regardless of exit code
#     2. Always create output files so the artifact upload has something
#     3. Never let pip-audit's exit code fail the job (findings are advisory)
#   We do this by running pip-audit with `|| true` and using `tee` to capture
#   stdout to a file, then touch the JSON output if pip-audit didn't create it.
# =============================================================================

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

# Default minimal permissions; individual jobs elevate only what they need.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # GitHub CodeQL — C and Python
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL / ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF to the Security tab
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, python]
        # Rust is not yet supported by CodeQL; covered by cargo-audit + Miri.

    steps:
      - uses: actions/checkout@v6
        with:
          # CodeQL traces the full build history for data-flow analysis.
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.5
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config: |
            paths:
              - c/
              - python/
            paths-ignore:
              - "**/*test*"
              - "**/*bench*"
              - "**/*fuzz*"

      # C: CodeQL must observe the build to trace data flows through the binary.
      - name: Build C for CodeQL tracing
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gcc clang make

          mkdir -p build-codeql
          # Compile every C file; ignore individual failures so CodeQL still
          # gets partial coverage from files that do compile.
          find c/ -name "*.c" 2>/dev/null | sort | \
            while IFS= read -r src; do
              out="build-codeql/$(basename "${src%.c}")"
              clang -Wall -std=c17 "$src" -o "$out" -lm 2>/dev/null || true
            done

      # Python: purely static — no build step needed.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.35.5
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  # ---------------------------------------------------------------------------
  # Rust — cargo audit
  # ---------------------------------------------------------------------------
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        # Exit code is non-zero when vulnerabilities are found.
        # We capture the output and always upload it, but do NOT fail the job
        # on findings — this is a learning repo, not production gated on CVEs.
        # Change `|| true` to remove this behaviour once the codebase matures.
        working-directory: rust
        run: |
          cargo audit \
            --color always \
            2>&1 | tee ../cargo-audit-report.txt || true

          # Surface a summary line in the Actions log.
          echo "--- cargo audit summary ---"
          grep -E "^(error|warning|Crate|Version|Title|Date|ID|Solution)" \
            ../cargo-audit-report.txt || echo "No findings."

      - name: Upload cargo audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-audit-report
          path: cargo-audit-report.txt
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Python — pip-audit
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          # Key on requirements files only; pyproject.toml may not exist yet.
          key: pip-audit-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: pip-audit-${{ runner.os }}-

      - name: Install project dependencies + pip-audit
        run: |
          pip install --upgrade pip pip-audit

          # Install project deps so pip-audit has an environment to scan.
          # Silently skip if requirements files don't exist yet.
          [[ -f requirements.txt ]]        && pip install -r requirements.txt        || true
          [[ -f python/requirements.txt ]] && pip install -r python/requirements.txt || true

      - name: Run pip-audit
        # pip-audit exits 1 in two distinct situations:
        #   a) It found vulnerable packages  → findings should be reported
        #   b) There is nothing to scan      → harmless on a fresh repo
        # In both cases we want the job to succeed and the report to upload.
        # Strategy:
        #   - Run with --output to write JSON regardless of findings
        #   - Capture human-readable output to a separate .txt file via tee
        #   - Touch the JSON file as a fallback so the artifact step always
        #     finds a file (pip-audit doesn't create the file on some errors)
        #   - Use `|| true` to prevent the non-zero exit from failing the step
        run: |
          # Human-readable output (also written to .txt for the artifact).
          pip-audit \
            --progress-spinner off \
            --desc \
            2>&1 | tee pip-audit-output.txt || true

          # Machine-readable JSON output.
          pip-audit \
            --progress-spinner off \
            --format json \
            --output pip-audit-report.json \
            2>/dev/null || true

          # Guarantee the files exist so upload-artifact never warns.
          # If pip-audit wrote nothing (e.g. no packages at all), these
          # create minimal valid placeholders.
          [[ -f pip-audit-output.txt ]]  || echo "pip-audit: no output" > pip-audit-output.txt
          [[ -f pip-audit-report.json ]] || echo '{"dependencies":[]}' > pip-audit-report.json

          # Print a summary line visible in the Actions log.
          echo "--- pip-audit summary ---"
          grep -E "^(Name|Skip|Found|No known)" pip-audit-output.txt | head -20 || true

      - name: Upload pip-audit report
        # `if: always()` ensures upload runs even if an earlier step failed.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: |
            pip-audit-report.json
            pip-audit-output.txt
          retention-days: 30
          # warn (not error) if somehow still no files — belt-and-suspenders.
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Dependency review — PR-only, blocks merging newly introduced vuln deps
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write  # Post a comment summarising findings on the PR

    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          # Fail PRs that introduce HIGH or CRITICAL severity vulnerabilities.
          fail-on-severity: high
          # Post the findings summary as a PR comment.
          comment-summary-in-pr: always
          # Deny these license types for licensing compliance.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  # ---------------------------------------------------------------------------
  # SBOM generation (CycloneDX) — main branch only
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: sbom-cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: sbom-cargo-${{ runner.os }}-

      - name: Install SBOM tools
        run: |
          pip install cyclonedx-bom
          cargo install cargo-cyclonedx --locked || true

      - name: Generate Python SBOM
        run: |
          mkdir -p sbom

          if [[ -f python/requirements.txt ]]; then
            cyclonedx-py requirements python/requirements.txt \
              --output-format json \
              --output-file sbom/python-sbom.json \
              2>&1 || true
          else
            echo '{"bomFormat":"CycloneDX","specVersion":"1.4","components":[]}' \
              > sbom/python-sbom.json
            echo "No python/requirements.txt — wrote empty SBOM placeholder."
          fi

      - name: Generate Rust SBOM
        run: |
          mkdir -p sbom

          if [[ -f rust/Cargo.toml ]]; then
            cd rust && cargo cyclonedx \
              --format json \
              --output-file ../sbom/rust-sbom.json \
              2>&1 || true
          else
            echo '{"bomFormat":"CycloneDX","specVersion":"1.4","components":[]}' \
              > sbom/rust-sbom.json
            echo "No rust/Cargo.toml — wrote empty SBOM placeholder."
          fi

      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom/
          retention-days: 90
          if-no-files-found: warn
