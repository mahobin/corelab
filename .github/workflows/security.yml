# =============================================================================
# security.yml — Security & Vulnerability Scanning Workflow
#
# Purpose:
#   Comprehensive security scanning for all three languages using GitHub
#   CodeQL, cargo-audit, pip-audit, and dependency review. Produces SBOM
#   fragments. Configured with minimal permissions following least-privilege
#   principle. Runs on a schedule and on every push/PR to main.
#
# Triggers:
#   - push to main
#   - PR to main
#   - Scheduled weekly scan (Monday 01:00 UTC)
#   - workflow_dispatch
#
# Architecture:
#   - CodeQL scans C and Python in parallel with GitHub's native action
#   - cargo-audit runs independently (Rust advisory DB)
#   - pip-audit scans Python dependency tree
#   - Dependency review on PRs catches new vulnerable deps before merge
#   - SARIF upload to GitHub Security tab for unified visibility
# =============================================================================

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

# Strict minimal permissions — each job adds only what it needs.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # GitHub CodeQL — C and Python
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL / ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      contents:      read
      security-events: write  # Required to upload SARIF to GitHub Security
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, python]
        # Rust is not supported by CodeQL yet; covered by cargo-audit + Miri.

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # CodeQL benefits from seeing changed lines.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.3
        with:
          languages: ${{ matrix.language }}
          # Use the extended security query suite for deeper analysis.
          queries: security-extended,security-and-quality
          config: |
            paths:
              - c/
              - python/
            paths-ignore:
              - "**/*test*"
              - "**/*bench*"
              - "**/*fuzz*"

      # For C, CodeQL needs to observe the actual build to trace code paths.
      - name: Build C for CodeQL tracing
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gcc clang make

          mkdir -p build-codeql
          find c/ -name "*.c" 2>/dev/null | sort | \
            while IFS= read -r src; do
              name="$(basename "${src%.c}")"
              clang -Wall -std=c17 "$src" -o "build-codeql/${name}" -lm || true
            done

      # Python analysis is purely static; no build step needed.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.35.3
        with:
          category: "/language:${{ matrix.language }}"
          # Output SARIF for GitHub Security tab upload (automatic with this action).
          upload: true

  # ---------------------------------------------------------------------------
  # Rust — cargo audit
  # ---------------------------------------------------------------------------
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents:      read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: rust
        run: |
          cargo audit \
            --deny warnings \
            --deny unsound \
            --deny yanked \
            --color always \
            2>&1 | tee ../cargo-audit-report.txt

      - name: Convert cargo-audit to SARIF
        if: always()
        run: |
          # Install cargo-audit-action's SARIF helper if available, else
          # emit a plain text report and skip SARIF upload.
          if cargo install cargo-audit --locked --features sarif 2>/dev/null; then
            cd rust && cargo audit --deny warnings --json \
              | cargo audit --json 2>/dev/null \
              > ../cargo-audit.sarif || true
          else
            echo "SARIF conversion not available — plain text report uploaded."
          fi

      - name: Upload cargo audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-audit-report
          path: cargo-audit-report.txt
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Python — pip-audit
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-audit-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: pip-audit-${{ runner.os }}-

      - name: Install deps + pip-audit
        run: |
          pip install --upgrade pip pip-audit
          [[ -f requirements.txt ]]        && pip install -r requirements.txt
          [[ -f python/requirements.txt ]] && pip install -r python/requirements.txt

      - name: Run pip-audit
        run: |
          pip-audit \
            --format json \
            --output pip-audit-report.json \
            --progress-spinner off \
            2>&1 | tee pip-audit-output.txt || true

          # Human-readable summary.
          pip-audit \
            --progress-spinner off \
            2>&1 >> pip-audit-output.txt || true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: |
            pip-audit-report.json
            pip-audit-output.txt
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Dependency review — PR-only, blocks merging vulnerable new deps
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write  # Post a comment on the PR with findings.

    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4.9.0
        with:
          # Block PRs that introduce critically or highly vulnerable deps.
          fail-on-severity: high
          # Comment on the PR with a summary.
          comment-summary-in-pr: always
          # Deny these license types to prevent licensing compliance issues.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  # ---------------------------------------------------------------------------
  # SBOM generation (CycloneDX)
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install SBOM tools
        run: |
          pip install cyclonedx-bom
          cargo install cargo-cyclonedx --locked || true

      - name: Generate Python SBOM
        run: |
          mkdir -p sbom
          [[ -f python/requirements.txt ]] && \
            cyclonedx-py requirements python/requirements.txt \
              --output sbom/python-sbom.json || true

      - name: Generate Rust SBOM
        run: |
          cd rust && cargo cyclonedx \
            --format json \
            --output-file ../sbom/rust-sbom.json \
            2>/dev/null || true

      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom/
          retention-days: 90
