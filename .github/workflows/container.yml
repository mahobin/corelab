# =============================================================================
# container.yml — Docker / GHCR Container Workflow
#
# Purpose:
#   Build multi-architecture container images for each language environment
#   (python-env, rust-env, c-env). Uses Docker Buildx + QEMU for linux/amd64
#   and linux/arm64 targets. Publishes to GitHub Container Registry (GHCR) on
#   pushes to main and on tags. Validates runtime tooling after each build.
#
# Triggers:
#   - push / PR on Dockerfile and docker/** paths
#   - workflow_dispatch
#
# Architecture:
#   - Build job matrix across image targets
#   - Layer caching via GitHub Actions cache (BuildKit cache-to/from)
#   - Separate validate job runs container smoke tests after build
#   - GHCR publish only on push to main or tag (not PRs)
# =============================================================================

name: Container

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "docker/**"
      - "containers/**"
      - "**/Dockerfile"
      - ".github/workflows/container.yml"
  pull_request:
    paths:
      - "docker/**"
      - "containers/**"
      - "**/Dockerfile"
      - ".github/workflows/container.yml"
  workflow_dispatch:

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write  # Required for GHCR push

defaults:
  run:
    shell: bash

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Matrix build + push for each language environment image
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: python-env
            dockerfile: docker/python/Dockerfile
            context: docker/python
            test_cmd: "python3 --version && pip --version"

          - image: rust-env
            dockerfile: docker/rust/Dockerfile
            context: docker/rust
            test_cmd: "rustc --version && cargo --version"

          - image: c-env
            dockerfile: docker/c/Dockerfile
            context: docker/c
            test_cmd: "gcc --version && clang --version && make --version"

    steps:
      - uses: actions/checkout@v4

      - name: Create default Dockerfile if absent
        run: |
          # Provide a sensible default Dockerfile so the workflow succeeds even
          # before hand-crafted Dockerfiles exist in the repo.
          mkdir -p "$(dirname "${{ matrix.dockerfile }}")"
          if [[ ! -f "${{ matrix.dockerfile }}" ]]; then
            echo "No Dockerfile found for ${{ matrix.image }} — generating default."

            case "${{ matrix.image }}" in
              python-env)
                cat > "${{ matrix.dockerfile }}" << 'PYEOF'
          FROM python:3.12-slim
          RUN apt-get update && apt-get install -y --no-install-recommends \
                gcc make git curl && rm -rf /var/lib/apt/lists/*
          RUN pip install --no-cache-dir ruff black mypy pytest
          WORKDIR /workspace
          CMD ["python3"]
          PYEOF
                ;;
              rust-env)
                cat > "${{ matrix.dockerfile }}" << 'RSEOF'
          FROM rust:slim
          RUN apt-get update && apt-get install -y --no-install-recommends \
                git make && rm -rf /var/lib/apt/lists/*
          RUN rustup component add clippy rustfmt
          WORKDIR /workspace
          CMD ["bash"]
          RSEOF
                ;;
              c-env)
                cat > "${{ matrix.dockerfile }}" << 'CEOF'
          FROM ubuntu:24.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y --no-install-recommends \
                gcc clang make cmake git valgrind cppcheck \
                && rm -rf /var/lib/apt/lists/*
          WORKDIR /workspace
          CMD ["bash"]
          CEOF
                ;;
            esac
          fi

      - name: Set up QEMU (for multi-arch cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use a named builder so cache layers are shared across steps.
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GHCR
        # Only authenticate when we need to push (not on PR builds).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            # Tag with `latest` on main branch.
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with the full git SHA (short).
            type=sha,prefix=sha-,format=short
            # Tag with the branch name (sanitized).
            type=ref,event=branch
            # Semantic version tags on v* tags.
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Push to GHCR only on non-PR events.
          push: ${{ github.event_name != 'pull_request' }}
          # Build for both architectures.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit inline cache — embeds cache metadata in the image layers.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # Enable BuildKit.
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ---------------------------------------------------------------------------
  # Smoke-test built images (amd64 only for speed)
  # ---------------------------------------------------------------------------
  validate:
    name: Validate ${{ matrix.image }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: python-env
            test_cmd: "python3 --version && pip --version && python3 -c 'import sys; print(sys.version)'"

          - image: rust-env
            test_cmd: "rustc --version && cargo --version"

          - image: c-env
            test_cmd: "gcc --version && clang --version && make --version && valgrind --version"

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local image for validation
        uses: docker/build-push-action@v6
        with:
          context: docker/${{ matrix.image == 'python-env' && 'python' || matrix.image == 'rust-env' && 'rust' || 'c' }}
          file: docker/${{ matrix.image == 'python-env' && 'python' || matrix.image == 'rust-env' && 'rust' || 'c' }}/Dockerfile
          load: true  # Load into local Docker daemon (amd64 only)
          tags: ${{ matrix.image }}:test
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Validate container startup + tooling
        run: |
          echo "=== Validating ${{ matrix.image }} ==="

          # Run the image and execute the test command.
          docker run --rm \
            --entrypoint /bin/sh \
            "${{ matrix.image }}:test" \
            -c "${{ matrix.test_cmd }}"

          echo "✓ Container validation passed for ${{ matrix.image }}"
