# =============================================================================
# c.yml — C Language CI Workflow
#
# Repository structure this workflow is designed for:
#   c/0001_stack_allocator.c
#   c/0002_lexer.c
#   c/0003_arena.c
#   ...
#
# Each file in c/ is a self-contained, single-translation-unit experiment.
# There is no multi-file build, no subdirectory structure, no library linking
# beyond -lm. The Makefile is a developer convenience tool (make run-c id=0001)
# not a CI build system.
#
# CI strategy:
#   1. Compile every *.c file in c/ independently with the matrix compiler/flags
#   2. Run every resulting binary (they each have a main() and produce output)
#   3. Apply sanitizers and Valgrind to every binary independently
#   4. Never call `make all` — the Makefile has no all target by design
#
# Matrix: {gcc, clang} × {C17, C23} × {debug, release}
#   C23 only with clang (GCC 13 on ubuntu-latest is needed; clang-18 is fine)
#
# Path filters: only runs when c/ files, headers, or this workflow change.
# =============================================================================

name: C

on:
  push:
    paths:
      - "c/**"
      - "**.c"
      - "**.h"
      - ".github/workflows/c.yml"
  pull_request:
    paths:
      - "c/**"
      - "**.c"
      - "**.h"
      - ".github/workflows/c.yml"
  workflow_dispatch:
    inputs:
      enable_valgrind:
        description: "Run Valgrind memory checks"
        type: boolean
        default: true

concurrency:
  group: c-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

# Warning flags shared across all compilation steps.
# These match the Makefile's WARN variable exactly so local and CI builds
# are byte-for-byte equivalent.
env:
  WARN: >-
    -Wall
    -Wextra
    -Wpedantic
    -Werror
    -Wconversion
    -Wsign-conversion
    -Wshadow
    -Wundef
    -Wstrict-prototypes
    -Wmissing-prototypes
    -Wmissing-declarations
    -Wcast-align
    -Wnull-dereference
    -Wdouble-promotion
    -Wformat=2

jobs:
  # ---------------------------------------------------------------------------
  # Static analysis — fast gate, runs before any compilation
  # ---------------------------------------------------------------------------
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cppcheck \
            clang-format \
            clang-tidy

      - name: Guard — skip if c/ is empty
        id: guard
        run: |
          if [ ! -d c ] || [ -z "$(find c/ -maxdepth 1 -name '*.c' 2>/dev/null | head -1)" ]; then
            echo "No C source files found in c/ — skipping static analysis."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: cppcheck
        if: steps.guard.outputs.skip == 'false'
        run: |
          cppcheck \
            --error-exitcode=1 \
            --enable=warning,style,performance,portability \
            --force \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            -I c/ \
            c/ \
            2>&1 | tee cppcheck-report.txt

      - name: clang-format check
        if: steps.guard.outputs.skip == 'false'
        run: |
          FAILED=0
          while IFS= read -r file; do
            if ! clang-format --dry-run --Werror "$file" 2>&1; then
              echo "::error file=${file}::Formatting violation — run: clang-format -i $file"
              FAILED=1
            fi
          done < <(find c/ -maxdepth 1 \( -name "*.c" -o -name "*.h" \) | sort)

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Fix all violations with:  find c/ -name '*.c' -o -name '*.h' | xargs clang-format -i"
            exit 1
          fi

      - name: Upload static analysis report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: c-static-analysis
          path: cppcheck-report.txt
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Build + run matrix — every experiment compiled and executed independently
  #
  # Each *.c file in c/ is compiled to its own binary and run.
  # There is deliberately no `make all` call — the Makefile is a developer
  # tool that builds one experiment at a time (make run-c id=0001).
  # CI compiles everything in the flat c/ directory.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.compiler }}, C${{ matrix.std }}, ${{ matrix.build_type }})
    needs: static-analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        std: ["17", "23"]
        build_type: [debug, release]
        exclude:
          # GCC 11 (default on ubuntu-latest) has incomplete C23 support.
          # Clang 18 (installed below) handles C23 correctly.
          - compiler: gcc
            std: "23"

    steps:
      - uses: actions/checkout@v6

      - name: Install ${{ matrix.compiler }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc \
            clang \
            make

      - name: Guard — skip if c/ is empty
        id: guard
        run: |
          if [ ! -d c ] || [ -z "$(find c/ -maxdepth 1 -name '*.c' 2>/dev/null | head -1)" ]; then
            echo "No C source files in c/ — nothing to build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set build flags
        if: steps.guard.outputs.skip == 'false'
        run: |
          echo "CC=${{ matrix.compiler }}" >> "$GITHUB_ENV"

          if [ "${{ matrix.build_type }}" = "release" ]; then
            echo "BUILD_OPT=-O2 -DNDEBUG" >> "$GITHUB_ENV"
          else
            echo "BUILD_OPT=-O1 -g -fno-omit-frame-pointer" >> "$GITHUB_ENV"
          fi

      - name: Compile every experiment in c/
        if: steps.guard.outputs.skip == 'false'
        run: |
          # Each *.c file is a self-contained experiment with its own main().
          # Compile them all independently into build/.
          # Failures are per-file: one broken experiment doesn't block others.
          mkdir -p build

          PASS=0; FAIL=0
          while IFS= read -r src; do
            name="$(basename "${src%.c}")"
            out="build/${name}"
            echo "--- ${{ matrix.compiler }} -std=c${{ matrix.std }} ${{ matrix.build_type }}: $src"

            if ${{ matrix.compiler }} \
                  ${{ env.WARN }} \
                  $BUILD_OPT \
                  -std=c${{ matrix.std }} \
                  "$src" -o "$out" -lm 2>&1; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
              echo "::error file=${src}::Compilation failed (${{ matrix.compiler }}, C${{ matrix.std }}, ${{ matrix.build_type }})"
            fi
          done < <(find c/ -maxdepth 1 -name "*.c" | sort)

          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          # Fail the step only if ALL files failed — a single broken experiment
          # should not hide results for all others.
          total=$((PASS + FAIL))
          if [ "$FAIL" -gt 0 ] && [ "$PASS" -eq 0 ] && [ "$total" -gt 0 ]; then
            echo "All $FAIL compilation(s) failed."
            exit 1
          fi

      - name: Run every built binary
        if: steps.guard.outputs.skip == 'false'
        run: |
          if [ ! -d build ] || [ -z "$(ls -A build 2>/dev/null)" ]; then
            echo "build/ is empty — no binaries to run."
            exit 0
          fi

          PASS=0; FAIL=0
          while IFS= read -r bin; do
            name="$(basename "$bin")"
            echo "--- run: $name"
            if timeout 30 "$bin" 2>&1; then
              PASS=$((PASS + 1))
            else
              rc=$?
              # timeout exits 124; treat it as a warning, not a hard failure
              if [ "$rc" -eq 124 ]; then
                echo "::warning::$name timed out after 30s"
              else
                echo "::warning::$name exited with code $rc"
              fi
              FAIL=$((FAIL + 1))
            fi
          done < <(find build/ -maxdepth 1 -type f -executable | sort)

          echo ""
          echo "Run results: $PASS OK, $FAIL non-zero"

      - name: Upload build artifacts
        if: always() && steps.guard.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: c-build-${{ matrix.compiler }}-c${{ matrix.std }}-${{ matrix.build_type }}
          path: build/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Sanitizers — ASan + UBSan on every experiment
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers (ASan + UBSan)
    needs: build
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: "halt_on_error=1:detect_leaks=1:detect_stack_use_after_return=1"
      UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"

    steps:
      - uses: actions/checkout@v6

      - name: Install clang
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang

      - name: Guard
        id: guard
        run: |
          if [ ! -d c ] || [ -z "$(find c/ -maxdepth 1 -name '*.c' 2>/dev/null | head -1)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with ASan + UBSan
        if: steps.guard.outputs.skip == 'false'
        run: |
          mkdir -p build-san
          while IFS= read -r src; do
            name="$(basename "${src%.c}")"
            echo "--- asan+ubsan: $src"
            clang \
              ${{ env.WARN }} \
              -fsanitize=address,undefined \
              -fno-omit-frame-pointer \
              -g -O1 \
              -std=c17 \
              "$src" -o "build-san/${name}" -lm 2>&1 || \
              echo "::warning file=${src}::Sanitizer build failed — skipping run"
          done < <(find c/ -maxdepth 1 -name "*.c" | sort)

      - name: Run sanitized binaries
        if: steps.guard.outputs.skip == 'false'
        run: |
          if [ ! -d build-san ] || [ -z "$(ls -A build-san 2>/dev/null)" ]; then
            echo "No sanitizer binaries produced — skipping."
            exit 0
          fi

          while IFS= read -r bin; do
            echo "=== $(basename "$bin") ==="
            timeout 30 "$bin" 2>&1 || true
          done < <(find build-san/ -maxdepth 1 -type f -executable | sort)

      - name: Upload sanitizer logs
        if: always() && steps.guard.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: c-sanitizer-logs
          path: build-san/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Valgrind
  # ---------------------------------------------------------------------------
  valgrind:
    name: Valgrind
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.enable_valgrind == true

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends valgrind gcc

      - name: Guard
        id: guard
        run: |
          if [ ! -d c ] || [ -z "$(find c/ -maxdepth 1 -name '*.c' 2>/dev/null | head -1)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build debug binaries (gcc for Valgrind compatibility)
        if: steps.guard.outputs.skip == 'false'
        run: |
          mkdir -p build-valgrind
          while IFS= read -r src; do
            name="$(basename "${src%.c}")"
            gcc \
              ${{ env.WARN }} \
              -O0 -g \
              -std=c17 \
              "$src" -o "build-valgrind/${name}" -lm 2>&1 || \
              echo "::warning file=${src}::Valgrind build failed — skipping"
          done < <(find c/ -maxdepth 1 -name "*.c" | sort)

      - name: Run Valgrind memcheck
        if: steps.guard.outputs.skip == 'false'
        run: |
          if [ ! -d build-valgrind ] || [ -z "$(ls -A build-valgrind 2>/dev/null)" ]; then
            echo "No Valgrind binaries produced — skipping."
            exit 0
          fi

          mkdir -p valgrind-logs
          while IFS= read -r bin; do
            name="$(basename "$bin")"
            echo "=== Valgrind: $name ==="
            valgrind \
              --error-exitcode=1 \
              --leak-check=full \
              --show-leak-kinds=all \
              --track-origins=yes \
              "$bin" 2>&1 | tee "valgrind-logs/${name}.txt" || true
          done < <(find build-valgrind/ -maxdepth 1 -type f -executable | sort)

      - name: Upload Valgrind logs
        if: always() && steps.guard.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: c-valgrind-logs
          path: valgrind-logs/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Benchmarks — experiments prefixed bench_ or in c/benchmarks/
  # ---------------------------------------------------------------------------
  benchmark:
    name: C Benchmarks
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gcc clang

      - name: Guard
        id: guard
        run: |
          # Look for files matching the bench_ prefix convention OR c/benchmarks/
          count=$(find c/ -maxdepth 2 \( -name "*bench*" -o -name "*benchmark*" \) \
                    -name "*.c" 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "No benchmark files found — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build benchmark binaries (release)
        if: steps.guard.outputs.skip == 'false'
        run: |
          mkdir -p build-bench
          find c/ -maxdepth 2 \( -name "*bench*" -o -name "*benchmark*" \) \
              -name "*.c" 2>/dev/null | sort | \
            while IFS= read -r src; do
              name="$(basename "${src%.c}")"
              echo "--- release build: $src"
              clang \
                -O3 -flto -march=native -DNDEBUG \
                -std=c17 \
                "$src" -o "build-bench/${name}" -lm 2>&1 || true
            done

      - name: Run benchmarks
        if: steps.guard.outputs.skip == 'false'
        run: |
          if [ ! -d build-bench ] || [ -z "$(ls -A build-bench 2>/dev/null)" ]; then
            echo "No benchmark binaries — skipping."
            exit 0
          fi

          mkdir -p bench-results
          while IFS= read -r bin; do
            name="$(basename "$bin")"
            echo "=== Benchmark: $name ==="
            /usr/bin/time -v "$bin" 2>&1 | tee "bench-results/${name}.txt" || true
          done < <(find build-bench/ -maxdepth 1 -type f -executable | sort)

      - name: Upload benchmark results
        if: always() && steps.guard.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: c-benchmark-results
          path: bench-results/
          retention-days: 30
          if-no-files-found: ignore
