# =============================================================================
# cross-platform.yml — Cross-Platform Build & Test Workflow
#
# Purpose:
#   Build and test C, Rust, and Python on Linux, macOS, and Windows.
#   Catches platform-specific bugs: path separators, syscall gaps, linker
#   differences, endianness assumptions, and OS ABI differences.
#   Also validates containerised builds and ARM64 via QEMU.
#
# Triggers:
#   - push / PR on any source path
#   - workflow_dispatch
#
# Architecture:
#   - Native matrix: 3 OS × 3 languages = 9 cells, fail-fast: false
#   - Container job: Linux Docker builds for each language env
#   - QEMU job: ARM64 emulated smoke test
#
# Key fix applied throughout this file:
#   `find <dir>/` exits 1 when <dir> does not exist, even with 2>/dev/null.
#   The error suppression only redirects stderr; the exit code still propagates
#   through the pipeline and fails the step. All find invocations now guard
#   with `[ -d <dir> ]` before running, so the step is a no-op (exit 0) on a
#   fresh repository where language subdirectories haven't been created yet.
# =============================================================================

name: Cross-Platform

on:
  push:
    paths:
      - "c/**"
      - "rust/**"
      - "python/**"
      - "**.c"
      - "**.h"
      - "**.rs"
      - "**.py"
      - "**/Cargo.toml"
      - "**/Makefile"
      - "**/CMakeLists.txt"
      - ".github/workflows/cross-platform.yml"
  pull_request:
    paths:
      - "c/**"
      - "rust/**"
      - "python/**"
      - "**.c"
      - "**.h"
      - "**.rs"
      - "**.py"
      - "**/Cargo.toml"
      - "**/Makefile"
      - ".github/workflows/cross-platform.yml"
  workflow_dispatch:

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Native cross-platform matrix
  # ---------------------------------------------------------------------------
  native:
    name: Native / ${{ matrix.os }} / ${{ matrix.language }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        language: [c, rust, python]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # -----------------------------------------------------------------------
      # Language-specific toolchain setup
      # -----------------------------------------------------------------------
      - name: Setup — Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup — Python
        if: matrix.language == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup — C (Linux)
        if: matrix.language == 'c' && runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends gcc clang make

      - name: Setup — C (macOS)
        if: matrix.language == 'c' && runner.os == 'macOS'
        run: |
          # Xcode CLT (always present on GitHub macOS runners) provides
          # /usr/bin/clang. Homebrew gcc/make are optional extras.
          # brew install can fail on pre-installed packages; || true is correct.
          brew install gcc make || true
          # Confirm clang is reachable before proceeding.
          clang --version

      - name: Setup — C (Windows)
        if: matrix.language == 'c' && runner.os == 'Windows'
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-clang make

      # -----------------------------------------------------------------------
      # Cargo cache (Rust only)
      # -----------------------------------------------------------------------
      - name: Cache Cargo
        if: matrix.language == 'rust'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: xplat-rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: xplat-rust-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # pip cache (Python only)
      # -----------------------------------------------------------------------
      - name: Cache pip
        if: matrix.language == 'python'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache
          key: xplat-pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: xplat-pip-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # C — build (Linux / macOS)
      # -----------------------------------------------------------------------
      - name: C — Build (Linux/macOS)
        if: matrix.language == 'c' && runner.os != 'Windows'
        shell: bash
        run: |
          # Guard: if c/ doesn't exist yet the step is a clean no-op (exit 0).
          if [ ! -d c ]; then
            echo "c/ directory not found — nothing to build yet."
            exit 0
          fi

          mkdir -p build-xplat

          find c/ -name "*.c" | sort | \
            while IFS= read -r src; do
              name="$(basename "${src%.c}")"
              rel_dir="$(dirname "${src#c/}")"
              
              # Preserve nested subdirectory structures to avoid name collisions
              if [ "$rel_dir" = "." ]; then
                target_bin="build-xplat/${name}"
              else
                mkdir -p "build-xplat/${rel_dir}"
                target_bin="build-xplat/${rel_dir}/${name}"
              fi

              echo "Compiling: $src -> $target_bin"
              clang -Wall -Wextra -std=c17 "$src" -o "$target_bin" -lm || true
            done

          echo "Build complete. Binaries:"
          # Recursively check if any files were built
          if [ -n "$(find build-xplat/ -type f 2>/dev/null)" ]; then
            find build-xplat/ -type f | sort
          else
            echo "  (none produced)"
          fi

      # -----------------------------------------------------------------------
      # C — build (Windows / MSYS2)
      # -----------------------------------------------------------------------
      - name: Set up MSVC
        if: matrix.language == 'c' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: C — Build (Windows/MSVC)
        if: matrix.language == 'c' && runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path -Path "c" -PathType Container)) {
            Write-Host "c/ directory not found — nothing to build yet."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path "build-xplat" | Out-Null

          # Recursively find and sort .c files
          Get-ChildItem -Path "c" -Filter "*.c" -Recurse | Sort-Object FullName | ForEach-Object {
            $src = $_.FullName
            $name = $_.BaseName
            
            # Recreate nested directory structures
            $relPath = [System.IO.Path]::GetRelativePath((Join-Path (Get-Location).Path "c"), $src)
            $relDir = [System.IO.Path]::GetDirectoryName($relPath)

            if ([string]::IsNullOrEmpty($relDir)) {
              $targetDir = "build-xplat"
            } else {
              $targetDir = "build-xplat\$relDir"
              New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
            }

            $targetBin = Join-Path $targetDir "${name}.exe"
            $objDir = "$targetDir\"  # MSVC requires trailing backslash for Fo directory

            Write-Host "Compiling: $relPath -> $targetBin"
            cl.exe /W4 /std:c17 "$src" /Fo"$objDir" /Fe"$targetBin"
          }

          Write-Host "Build complete. Binaries:"
          if (Test-Path -Path "build-xplat") {
            Get-ChildItem -Path "build-xplat" -Filter "*.exe" -Recurse | Select-Object -ExpandProperty FullName | Sort-Object
          } else {
            Write-Host "  (none produced)"
          }

      # -----------------------------------------------------------------------
      # C — run (Linux / macOS)
      # -----------------------------------------------------------------------
      - name: C — Run tests (Linux/macOS)
        if: matrix.language == 'c' && runner.os != 'Windows'
        shell: bash
        run: |
          # Guard: build-xplat/ may not exist if the build step produced
          # nothing (empty c/ directory or all compilations failed with ||true).
          if [ ! -d build-xplat ] || [ -z "$(ls -A build-xplat 2>/dev/null)" ]; then
            echo "No built binaries found — skipping run step."
            exit 0
          fi
          
          # Find all files recursively and check execution permissions inside the loop
          find build-xplat/ -type f | sort | \
            while IFS= read -r bin; do
              if [ -x "$bin" ]; then
                echo "Running: $bin"
                
                # Cross-platform timeout handling:
                # 1. Use GNU 'timeout' if available (standard Linux)
                # 2. Use Homebrew 'gtimeout' if available (some macOS environments)
                # 3. Fallback to Perl 'alarm' (pre-installed by default on both Linux and macOS)
                if command -v timeout &> /dev/null; then
                  timeout 30 "$bin" || true
                elif command -v gtimeout &> /dev/null; then
                  gtimeout 30 "$bin" || true
                else
                  # Triggers a SIGALRM after 30 seconds, terminating the process if it hangs
                  perl -e 'alarm shift; exec @ARGV' 30 "$bin" || true
                fi
              fi
            done

      # -----------------------------------------------------------------------
      # C — run (Windows)
      # -----------------------------------------------------------------------
      - name: C — Run tests (Windows)
        if: matrix.language == 'c' && runner.os == 'Windows'
        shell: pwsh
        run: |
          # Check if the folder exists and actually contains .exe files (ignoring .obj files)
          if (-not (Test-Path -Path "build-xplat") -or @(Get-ChildItem -Path "build-xplat" -Filter "*.exe" -Recurse).Count -eq 0) {
            Write-Host "No built binaries found — skipping run step."
            exit 0
          }

          # Find and run each compiled .exe sequentially
          Get-ChildItem -Path "build-xplat" -Filter "*.exe" -Recurse | Sort-Object FullName | ForEach-Object {
            $bin = $_.FullName
            Write-Host "Running: $bin"
            
            # Start the binary natively
            $proc = Start-Process -FilePath $bin -PassThru -NoNewWindow -ErrorAction SilentlyContinue
            if ($proc) {
              # Wait up to 30 seconds for the program to exit
              $proc | Wait-Process -Timeout 30 -ErrorAction SilentlyContinue
              
              # If the program is still running after 30 seconds, terminate it
              if (-not $proc.HasExited) {
                Write-Host "Warning: $bin timed out. Killing process..."
                $proc | Stop-Process -Force -ErrorAction SilentlyContinue
              }
            } else {
              Write-Host "Error: Failed to start $bin"
            }
          }

      # -----------------------------------------------------------------------
      # Rust — build + test
      # -----------------------------------------------------------------------
      - name: Rust — Build
        if: matrix.language == 'rust'
        shell: bash
        run: |
          if [ ! -d rust ] || [ ! -f rust/Cargo.toml ]; then
            echo "rust/ directory or Cargo.toml not found — skipping."
            exit 0
          fi
          cd rust
          cargo build --all-targets 2>&1 | tail -20

      - name: Rust — Test
        if: matrix.language == 'rust'
        shell: bash
        run: |
          if [ ! -d rust ] || [ ! -f rust/Cargo.toml ]; then
            echo "rust/ directory or Cargo.toml not found — skipping."
            exit 0
          fi
          cd rust
          cargo test --all-targets --no-fail-fast \
            2>&1 | tee ../rust-test-${{ runner.os }}.txt || true

      # -----------------------------------------------------------------------
      # Python — install, compile, test
      # -----------------------------------------------------------------------
      - name: Python — Install deps (Linux/macOS)
        if: matrix.language == 'python' && runner.os != 'Windows'
        shell: bash
        run: |
          pip install --upgrade pip
          [ -f python/requirements.txt ] && pip install -r python/requirements.txt || true
          pip install pytest

      - name: Python — Install deps (Windows)
        if: matrix.language == 'python' && runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "python/requirements.txt") {
            pip install -r python/requirements.txt
          }
          pip install pytest

      - name: Python — Bytecode compile
        if: matrix.language == 'python'
        shell: bash
        run: |
          if [ ! -d python ]; then
            echo "python/ directory not found — skipping."
            exit 0
          fi
          python -m compileall -q python/ 2>&1 || true

      - name: Python — pytest
        if: matrix.language == 'python'
        shell: bash
        run: |
          if [ ! -d python ]; then
            echo "python/ directory not found — skipping."
            exit 0
          fi
          pytest python/ -v --tb=short --no-header --color=yes \
            2>&1 | tee python-test-${{ runner.os }}.txt || true

      # -----------------------------------------------------------------------
      # Upload per-cell artifacts
      # -----------------------------------------------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xplat-${{ matrix.language }}-${{ runner.os }}
          path: |
            rust-test-${{ runner.os }}.txt
            python-test-${{ runner.os }}.txt
            build-xplat/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Containerised Linux builds — reproducible environments
  # ---------------------------------------------------------------------------
  containerized:
    name: Container / ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: python:3.12-slim
            language: python
            install_cmd: "true"
            test_cmd: |
              cd /workspace
              pip install --quiet pytest
              if [ -d python ]; then
                python -m compileall -q python/ 2>/dev/null || true
                pytest python/ -v --tb=short --color=yes || true
              else
                echo "python/ not found — skipping"
              fi

          - image: rust:slim
            language: rust
            install_cmd: "true"
            test_cmd: |
              if [ -f /workspace/rust/Cargo.toml ]; then
                cd /workspace/rust
                cargo build --all-targets 2>&1 | tail -10
                cargo test --all-targets --no-fail-fast 2>&1 | tail -20 || true
              else
                echo "rust/Cargo.toml not found — skipping"
              fi

          - image: ubuntu:24.04
            language: c
            install_cmd: |
              apt-get update -q
              apt-get install -y --no-install-recommends gcc clang make
            test_cmd: |
              if [ ! -d /workspace/c ]; then
                echo "c/ not found — skipping"
              else
                mkdir -p /tmp/build
                find /workspace/c -name "*.c" | sort | \
                  while IFS= read -r src; do
                    name="$(basename "${src%.c}")"
                    clang -Wall -std=c17 "$src" -o "/tmp/build/${name}" -lm || true
                    [ -x "/tmp/build/${name}" ] && timeout 10 "/tmp/build/${name}" || true
                  done
              fi

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ${{ matrix.language }} tests in ${{ matrix.image }}
        run: |
          docker run --rm \
            --volume "$PWD:/workspace:ro" \
            "${{ matrix.image }}" \
            /bin/sh -c "
              ${{ matrix.install_cmd }}
              ${{ matrix.test_cmd }}
            " 2>&1 | tee container-test-${{ matrix.language }}.txt || true

      - name: Upload container test output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-test-${{ matrix.language }}
          path: container-test-${{ matrix.language }}.txt
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # ARM64 smoke test via QEMU emulation
  # ---------------------------------------------------------------------------
  arm64-smoke:
    name: ARM64 Smoke (QEMU)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build + run ARM64 Python smoke test
        run: |
          docker run --rm --platform linux/arm64 \
            --volume "$PWD:/workspace:ro" \
            python:3.12-slim \
            /bin/sh -c "
              python3 --version
              python3 -c 'import platform; print(platform.machine())'
              if [ -d /workspace/python ]; then
                python3 -m compileall -q /workspace/python/ 2>/dev/null || true
              else
                echo 'python/ not found — skipping compileall'
              fi
            " 2>&1 | tee arm64-smoke.txt

      - name: Upload ARM64 smoke output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arm64-smoke
          path: arm64-smoke.txt
          retention-days: 7
          if-no-files-found: ignore
